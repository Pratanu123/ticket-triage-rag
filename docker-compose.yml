services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-triage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triage}
      POSTGRES_DB: ${POSTGRES_DB:-triage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-triage} -d ${POSTGRES_DB:-triage}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  # One-shot: pull chat + embedding models on first run (persisted in ollama_data).
  ollama-pull:
    image: ollama/ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ./scripts/pull_ollama_models.sh:/pull_ollama_models.sh:ro
    entrypoint: ["/bin/sh", "/pull_ollama_models.sh"]
    depends_on:
      ollama:
        condition: service_started
    restart: "no"

  # One-shot: chunk + embed seed_data into Chroma via Ollama nomic-embed-text.
  # Re-run with: docker compose run --rm embed python -m app.rag.embed --force
  embed:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SEED_DATA_PATH: /app/app/rag/seed_data
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    command: ["python", "-m", "app.rag.embed"]
    depends_on:
      chromadb:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-triage}:${POSTGRES_PASSWORD:-triage}@postgres:5432/${POSTGRES_DB:-triage}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.7}
      SEED_DATA_PATH: /app/app/rag/seed_data
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      embed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
