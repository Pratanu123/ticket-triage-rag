services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-triage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triage}
      POSTGRES_DB: ${POSTGRES_DB:-triage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-triage} -d ${POSTGRES_DB:-triage}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # One-shot job: chunk + embed seed_data into Chroma before the API serves traffic.
  # Idempotent (deterministic upsert IDs). Re-run with:
  #   docker compose run --rm embed python -m app.rag.embed --force
  embed:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SEED_DATA_PATH: /app/app/rag/seed_data
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    command: ["python", "-m", "app.rag.embed"]
    depends_on:
      chromadb:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-triage}:${POSTGRES_PASSWORD:-triage}@postgres:5432/${POSTGRES_DB:-triage}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.7}
      SEED_DATA_PATH: /app/app/rag/seed_data
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      embed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
